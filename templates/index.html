<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصر الرقمية — خدمة العملاء بلغة الإشارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #A31B21;
            --dark: #1a1a2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark);
            color: #fff;
            height: 100vh;
            display: flex;
        }

        .video-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            gap: 20px;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--red);
        }

        .brand span {
            color: #fff;
            font-weight: 400;
        }

        .video-wrap {
            width: 100%;
            max-width: 640px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            background: #000;
            box-shadow: 0 0 40px rgba(163, 27, 33, 0.3);
        }

        video {
            width: 100%;
            display: block;
            transform: scaleX(-1);
        }

        .translation-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            padding: 30px 20px 20px;
            text-align: center;
        }

        .translation-text {
            font-size: 2.2rem;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
            min-height: 45px;
            transition: all 0.3s ease;
        }

        .translation-text.waiting {
            color: rgba(255, 255, 255, 0.35);
            font-size: 1.1rem;
            font-weight: 400;
        }

        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 50px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-start {
            background: var(--red);
            color: #fff;
        }

        .btn-start:hover {
            background: #c0232a;
            transform: scale(1.05);
        }

        .btn-stop {
            background: #333;
            color: #fff;
        }

        .powered {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }

        .chat-side {
            width: 380px;
            background: rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: var(--red);
            padding: 20px;
            text-align: center;
        }

        .chat-header h2 {
            font-size: 1.1rem;
            margin: 0;
        }

        .chat-header p {
            font-size: 0.85rem;
            opacity: 0.7;
            margin: 5px 0 0;
        }

        .chat-log {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 90%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.bot {
            background: rgba(255, 255, 255, 0.08);
            align-self: flex-start;
            border-top-right-radius: 0;
            color: #ccc;
        }

        .msg.user {
            background: var(--red);
            align-self: flex-end;
            border-top-left-radius: 0;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="chat-side">
        <div class="chat-header">
            <h2>سجل المحادثة</h2>
            <p>ترجمة لغة الإشارة ← رد خدمة العملاء</p>
        </div>
        <div class="chat-log" id="chat">
            <div class="msg bot">مرحباً بك في مصر الرقمية! تفضل بعمل إشارة أمام الكاميرا وسأساعدك فوراً.</div>
        </div>
    </div>

    <div class="video-side">
        <div class="brand">🇪🇬 مصر الرقمية <span>| خدمة العملاء</span></div>
        <div class="video-wrap">
            <video id="vid" autoplay playsinline muted></video>
            <div class="translation-overlay">
                <div class="translation-text waiting" id="liveText">اضغط تشغيل للبدء</div>
            </div>
        </div>
        <div>
            <button class="btn btn-start" id="mainBtn" onclick="toggle()">▶ تشغيل الترجمة</button>
        </div>
        <div class="powered">Powered by Wasel Core AI Engine (SaaS)</div>
    </div>

    <canvas id="cv" width="512" height="512" style="display:none"></canvas>

    <script>
        var API_URL = "https://wasel-saas-engine-112458895076.europe-west1.run.app/api/v1/translate";
        var API_KEY = "dx_egypt_key_2026";

        var vid = document.getElementById('vid');
        var cv = document.getElementById('cv');
        var cx = cv.getContext('2d');
        var liveText = document.getElementById('liveText');
        var chat = document.getElementById('chat');
        var mainBtn = document.getElementById('mainBtn');

        var running = false;
        var botBusy = false;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } })
            .then(function (s) { vid.srcObject = s; })
            .catch(function () { liveText.textContent = "خطأ في الكاميرا"; });

        function addMsg(text, who) {
            var d = document.createElement('div');
            d.className = 'msg ' + who;
            d.textContent = text;
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function setLive(text, isSign) {
            liveText.textContent = text;
            if (isSign) {
                liveText.classList.remove('waiting');
            } else {
                liveText.classList.add('waiting');
            }
        }

        function askBot(signText) {
            if (botBusy) return;
            botBusy = true;
            fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: signText })
            })
                .then(function (r) { return r.json(); })
                .then(function (d) { if (d.reply) addMsg(d.reply, 'bot'); })
                .catch(function (e) { console.error(e); })
                .finally(function () { botBusy = false; });
        }

        function loop() {
            if (!running) return;
            if (botBusy) { setTimeout(loop, 500); return; }

            // Capture 2 frames for motion detection (fast)
            var frames = [];
            var captureIndex = 0;

            function captureNext() {
                if (!running) return;
                cx.drawImage(vid, 0, 0, 512, 512);
                frames.push(cv.toDataURL('image/jpeg', 0.4));
                captureIndex++;

                if (captureIndex < 2) {
                    setTimeout(captureNext, 200);
                } else {
                    sendFrames(frames);
                }
            }
            captureNext();
        }

        function sendFrames(frames) {
            if (!running) return;

            setLive("جاري التحليل ...", false);

            var xhr = new XMLHttpRequest();
            xhr.open("POST", API_URL, true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.setRequestHeader("X-API-Key", API_KEY);
            xhr.timeout = 6000;

            xhr.onload = function () {
                if (xhr.status === 204) {
                    setLive("في انتظار إشارة ...", false);
                } else if (xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        var t = data.translation;
                        if (t && t !== "..." && t.trim().length > 0) {
                            setLive(t, true);
                            addMsg("🤟 " + t, 'user');
                            askBot(t);
                        } else {
                            setLive("في انتظار إشارة ...", false);
                        }
                    } catch (e) {
                        setLive("في انتظار إشارة ...", false);
                    }
                } else if (xhr.status === 401) {
                    setLive("خطأ في المفتاح (API Key)", false);
                } else {
                    setLive("خطأ من المحرك (" + xhr.status + ")", false);
                }

                if (running) setTimeout(loop, 300);
            };

            xhr.onerror = function () {
                setLive("خطأ في الاتصال بالمحرك", false);
                if (running) setTimeout(loop, 1000);
            };

            xhr.ontimeout = function () {
                setLive("بطء في الشبكة...", false);
                if (running) setTimeout(loop, 500);
            };

            xhr.send(JSON.stringify({ images_base64: frames }));
        }

        function toggle() {
            running = !running;
            if (running) {
                mainBtn.textContent = "⏹ إيقاف";
                mainBtn.className = "btn btn-stop";
                setLive("في انتظار إشارة ...", false);
                loop();
            } else {
                mainBtn.textContent = "▶ تشغيل الترجمة";
                mainBtn.className = "btn btn-start";
                setLive("الترجمة متوقفة", false);
            }
        }
    </script>
</body>

</html>
