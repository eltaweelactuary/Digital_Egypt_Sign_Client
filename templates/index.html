<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصر الرقمية — خدمة العملاء بلغة الإشارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #A31B21;
            --dark: #1a1a2e;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark);
            color: #fff;
            height: 100vh;
            display: flex;
        }

        /* === LEFT: Video + Translation === */
        .video-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            gap: 20px;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--red);
        }

        .brand span {
            color: #fff;
            font-weight: 400;
        }

        .video-wrap {
            width: 100%;
            max-width: 640px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            background: #000;
            box-shadow: 0 0 40px rgba(163, 27, 33, 0.3);
        }

        video {
            width: 100%;
            display: block;
            transform: scaleX(-1);
        }

        /* Live translation overlay on the video */
        .translation-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
            padding: 30px 20px 20px;
            text-align: center;
        }

        .translation-text {
            font-size: 2rem;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
            min-height: 40px;
            transition: all 0.3s ease;
        }

        .translation-text.waiting {
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.2rem;
            font-weight: 400;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 50px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-start {
            background: var(--red);
            color: #fff;
        }

        .btn-start:hover {
            background: #c0232a;
            transform: scale(1.05);
        }

        .btn-stop {
            background: #333;
            color: #fff;
        }

        .powered {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }

        /* === RIGHT: Chat Log === */
        .chat-side {
            width: 380px;
            background: rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: var(--red);
            padding: 20px;
            text-align: center;
        }

        .chat-header h2 {
            font-size: 1.1rem;
            margin: 0;
        }

        .chat-header p {
            font-size: 0.85rem;
            opacity: 0.7;
            margin: 5px 0 0;
        }

        .chat-log {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 90%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.bot {
            background: rgba(255, 255, 255, 0.08);
            align-self: flex-start;
            border-top-right-radius: 0;
            color: #ccc;
        }

        .msg.user {
            background: var(--red);
            align-self: flex-end;
            border-top-left-radius: 0;
            color: #fff;
        }
    </style>
</head>

<body>

    <!-- Chat Sidebar -->
    <div class="chat-side">
        <div class="chat-header">
            <h2>سجل المحادثة</h2>
            <p>ترجمة لغة الإشارة ← رد خدمة العملاء</p>
        </div>
        <div class="chat-log" id="chat">
            <div class="msg bot">مرحباً بك في مصر الرقمية! تفضل بعمل إشارة أمام الكاميرا وسأساعدك فوراً.</div>
        </div>
    </div>

    <!-- Video + Live Translation -->
    <div class="video-side">
        <div class="brand">🇪🇬 مصر الرقمية <span>| خدمة العملاء</span></div>

        <div class="video-wrap">
            <video id="vid" autoplay playsinline muted></video>
            <div class="translation-overlay">
                <div class="translation-text waiting" id="liveText">في انتظار إشارة ...</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="mainBtn" onclick="toggle()">▶ تشغيل الترجمة</button>
        </div>
        <div class="powered">Powered by Wasel Core AI Engine (SaaS)</div>
    </div>

    <canvas id="c" width="512" height="512" style="display:none"></canvas>

    <script>
        // ===== Hardcoded Config =====
        const API_URL = "https://wasel-saas-engine-112458895076.europe-west1.run.app/api/v1/translate";
        const API_KEY = "dx_egypt_key_2026";

        // ===== DOM =====
        const vid = document.getElementById('vid');
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        const liveText = document.getElementById('liveText');
        const chat = document.getElementById('chat');
        const mainBtn = document.getElementById('mainBtn');

        let running = false;
        let botBusy = false;

        // ===== Camera =====
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } })
            .then(s => { vid.srcObject = s; })
            .catch(() => { liveText.textContent = "خطأ في الكاميرا"; });

        // ===== Helpers =====
        function addMsg(text, who) {
            const d = document.createElement('div');
            d.className = 'msg ' + who;
            d.textContent = text;
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function setLive(text, isSign) {
            liveText.textContent = text;
            if (isSign) {
                liveText.classList.remove('waiting');
            } else {
                liveText.classList.add('waiting');
            }
        }

        // ===== Capture 3 frames (motion chunk) =====
        async function grabFrames() {
            let frames = [];
            for (let i = 0; i < 3; i++) {
                ctx.drawImage(vid, 0, 0, 512, 512);
                frames.push(canvas.toDataURL('image/jpeg', 0.5));
                if (i < 2) await new Promise(r => setTimeout(r, 300));
            }
            return frames;
        }

        // ===== Ask chatbot to respond =====
        async function askBot(signText) {
            if (botBusy) return;
            botBusy = true;
            try {
                let r = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: signText })
                });
                let d = await r.json();
                if (d.reply) addMsg(d.reply, 'bot');
            } catch (e) { console.error(e); }
            finally { botBusy = false; }
        }

        // ===== Main Loop =====
        async function loop() {
            if (!running) return;

            if (botBusy) {
                setTimeout(loop, 800);
                return;
            }

            try {
                // Capture 3 sequential frames
                let frames = [];
                for (let i = 0; i < 3; i++) {
                    ctx.drawImage(vid, 0, 0, 512, 512);
                    frames.push(c.toDataURL('image/jpeg', 0.5));
                    if (i < 2) await new Promise(r => setTimeout(r, 300));
                }

                // Send to Wasel SaaS Engine
                let ac = new AbortController();
                let tid = setTimeout(() => ac.abort(), 5000);

                let res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': API_KEY
                    },
                    body: JSON.stringify({ images_base64: frames }),
                    signal: ac.signal
                });

                clearTimeout(tid);

                if (res.status === 204) {
                    // No sign detected
                    setLive("في انتظار إشارة ...", false);
                } else if (res.status === 200) {
                    let data = await res.json();
                    let t = data.translation;
                    if (t && t !== "..." && t.trim().length > 0) {
                        // Show translation on video overlay
                        setLive(t, true);
                        // Add to chat log
                        addMsg("🤟 " + t, 'user');
                        // Get bot response
                        askBot(t);
                    } else {
                        setLive("في انتظار إشارة ...", false);
                    }
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    setLive("بطء في الشبكة...", false);
                } else {
                    console.error("Loop error:", e);
                }
            }

            if (running) setTimeout(loop, 500);
        }

        // ===== Toggle =====
        function toggle() {
            running = !running;
            if (running) {
                mainBtn.textContent = "⏹ إيقاف";
                mainBtn.className = "btn btn-stop";
                setLive("في انتظار إشارة ...", false);
                loop();
            } else {
                mainBtn.textContent = "▶ تشغيل الترجمة";
                mainBtn.className = "btn btn-start";
                setLive("الترجمة متوقفة", false);
            }
        }
    </script>
</body>

</html>
